{{- if .Values.komodo.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "komodo.fullname" . }}
  labels:
    {{- include "komodo.labels" . | nindent 4 }}
  {{- with .Values.komodo.ingress.annotations }}
  annotations: {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.komodo.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- with .Values.komodo.ingress.tls }}
  tls: {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.komodo.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "komodo.fullname" $ }}
                port: { name: http }
          {{- end }}
    {{- end }}
{{- end }}
