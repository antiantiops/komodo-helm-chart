name: Helm chart CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  test:
    name: lint and render
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Helm lint
        run: |
          helm lint komodo \
            --set komodo.auth.initAdminPassword=ci-test \
            --set komodo.auth.jwtSecret=ci-test \
            --set komodo.auth.passkey=ci-test \
            --set komodo.auth.webhookSecret=ci-test \
            --set mongo.auth.rootPassword=ci-test
      - name: Render all templates
        run: |
          helm template komodo komodo \
            --namespace komodo \
            --set komodo.auth.initAdminPassword=ci-test \
            --set komodo.auth.jwtSecret=ci-test \
            --set komodo.auth.passkey=ci-test \
            --set komodo.auth.webhookSecret=ci-test \
            --set mongo.auth.rootPassword=ci-test \
            > /tmp/komodo-manifests.yaml
          test -s /tmp/komodo-manifests.yaml
